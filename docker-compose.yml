name: bitcoin-cash-node
services:
  node:
    image: zquestz/bitcoin-cash-node
    command: bitcoind
    ports:
      - "8333:8333"
    volumes:
      - ./node-data:/data
      - ./node-conf/bitcoin.conf:/data/bitcoin.conf
    healthcheck:
      test: ["CMD", "/entrypoint.sh", "bitcoin-cli", "getblockchaininfo"]

  pool:
    image: asicseer-pool
    ports:
      - "3333:3333"
    volumes:
      - ./pool-conf:/asicseer/conf
      - ./pool-logs:/asicseer/logs
    depends_on:
      node:
        condition: service_healthy
    command: asicseer-pool -l 7 -k -c /asicseer/conf/asicseer-pool.conf

  web:
    image: nginx:alpine
    user: root
    ports:
      - "80:80"
    volumes:
      - ./pool-logs:/var/www/pool:ro
      - ./nginx-conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pool

