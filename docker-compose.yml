name: bitcoin-cash-node
services:
  node:
    image: zquestz/bitcoin-cash-node
    restart: unless-stopped
    command: bitcoind
    ports:
      - "8333:8333"
    volumes:
      - ./node-data:/data
      - ./node-conf/bitcoin.conf:/data/bitcoin.conf
    healthcheck:
      test: ["CMD", "/entrypoint.sh", "bitcoin-cli", "getblockchaininfo"]

  pool:
    image: asicseer-pool
    restart: unless-stopped
    ports:
      - "3333:3333"
      - "3334:3334"
    volumes:
      - ./pool-conf:/asicseer/conf
      - ./pool-logs:/asicseer/logs
    depends_on:
      node:
        condition: service_healthy
    command: sh -c "rm -f /tmp/asicseer-pool/main.pid && exec asicseer-pool -l 7 -c /asicseer/conf/asicseer-pool.conf"

  web:
    image: nginx:alpine
    restart: unless-stopped
    user: root
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./pool-logs:/var/www/pool:ro
      - ./nginx-conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - pool

