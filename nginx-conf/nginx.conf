server {
    listen 80;
    server_name para.bch.ee;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name para.bch.ee;

    ssl_certificate     /etc/letsencrypt/live/para.bch.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/para.bch.ee/privkey.pem;

    root /var/www/pool;

    # Block the all-miners list and workers directory
    location = /pool/pool.miners { return 403; }
    location /workers/ { return 403; }

    # Serve everything else as JSON with CORS headers
    location / {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        default_type application/json;
        try_files $uri =404;
    }
}
