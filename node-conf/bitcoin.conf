# Bitcoin Cash Node configuration for asicseer-pool parasite

# RPC credentials - must match asicseer-pool.conf
rpcuser=poolrpc
rpcpassword=CHANGE_THIS_TO_A_STRONG_PASSWORD
rpcallowip=0.0.0.0/0
rpcbind=0.0.0.0

# ZMQ - pool uses this for instant block notifications
zmqpubhashblock=tcp://0.0.0.0:28332

# Wallet - required for sendtoaddress (finder bonus payments)
wallet=pool_wallet

# Performance
dbcache=512
maxmempool=300

# Network
listen=1
port=8333
maxconnections=32
